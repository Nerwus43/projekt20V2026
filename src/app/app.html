<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">Team Tasking</p>
      <h1>Panel pracy zespolu</h1>
    </div>
    <div class="status-pill">{{ store.members().length }} osoby</div>
  </header>

  <nav class="main-nav" aria-label="Glowne widoki">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Strona glowna
    </a>
    <a routerLink="/zespol" routerLinkActive="active">Zarzadzanie zespolem</a>
    <a routerLink="/zadania" routerLinkActive="active">Zarzadzanie zadaniami</a>
  </nav>

  <router-outlet />
</main>
